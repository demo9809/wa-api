[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "freetype",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "ttf-dejavu"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/run/current-system/sw/bin/chromium"
CHROME_BIN = "/run/current-system/sw/bin/chromium"
